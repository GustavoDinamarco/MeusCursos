# alembic.ini
# Arquivo de configuração do Alembic.
# A DATABASE_URL real é injetada via env.py a partir das variáveis de ambiente.

[alembic]
# Caminho para os scripts de migração
script_location = alembic

# Padrão de nomeação dos arquivos de migração: timestamp + slug da mensagem
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Codificação do source code
source_encoding = utf-8

# A URL abaixo é um placeholder; a URL real vem do env.py via pydantic-settings.
sqlalchemy.url = postgresql+asyncpg://placeholder

[post_write_hooks]
# hooks opcionais para formatar migrações geradas (ex: ruff)
# hooks = ruff
# ruff.type = exec
# ruff.entrypoint = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
